<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online courses</title>
    <link rel="stylesheet" href="index.scss" />
  </head>
  <body>
    <div class="main-wrapper">
      <main class="main">
        <section class="section title-section">
          <div class="container">
            <div class="title-section__subtitle">Enjoy your studying!</div>
            <h1 class="title">Our online courses</h1>
          </div>
        </section>
        <section class="section list-section courses-list-section">
          <div class="container">
            <div class="list-section__top">
              <ul class="list-section__categories-list">
                <li>
                  <a
                      href="#"
                      data-filter-type="all"
                      class="list-section__category-item button"
                      data-number="17"
                  >All</a
                  >
                </li>
                <li>
                  <a
                      href="#marketing"
                      data-filter-type="marketing"
                      class="list-section__category-item button"
                      data-number=""
                  >Marketing</a
                  >
                </li>
                <li>
                  <a
                      href="#management"
                      data-filter-type="management"
                      class="list-section__category-item button"
                      data-number=""
                  >Management</a
                  >
                </li>
                <li>
                  <a
                      href="#hr"
                      data-filter-type="hr"
                      class="list-section__category-item button"
                      data-number=""
                  >HR & Recruting</a
                  >
                </li>
                <li>
                  <a
                      href="#design"
                      data-filter-type="design"
                      class="list-section__category-item button"
                      data-number=""
                  >Design</a
                  >
                </li>
                <li>
                  <a
                      href="#development"
                      data-filter-type="development"
                      class="list-section__category-item button"
                      data-number="3"
                  >Development</a
                  >
                </li>
              </ul>
              <input class="input list-section__search-input" type="text"  placeholder="Search course..." />
            </div>
            <div class="card course-card course-card_template">
              <a href="" class="card__picture-wrapper">
                <picture class="card__picture">
                  <source srcset="/media/courses/card-1.jpg" data-field="image" />
                  <img src="/media/courses/card-1.jpg" alt="" />
                </picture>
              </a>
              <div class="card__body">
                <div class="card__tag-list">
                  <span class="tag" data-field="tag">Marketing</span>
                </div>
                <a href="" class="card__title" data-field="title">The Ultimate Google Ads Training Course</a>
                <div class="card__bottom">
                  <span class="course-card__price" data-field="price">$100</span>
                  <span class="course-card__author" data-field="author">by Jerome Bell</span>
                </div>
              </div>
            </div>
            <ul class="list-section__list courses-list-section__list">

            </ul>
            <button
                class="text-button text-button_icon text-button_load-icon list-section__load-more-button"
                type="button"
            >
              Load more
            </button>
          </div>
        </section>
      </main>
    </div>
    <script src="index.js" type="module"></script>
  </body>
</html>
