<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Online courses</title>
    <link rel="stylesheet" href="index.scss" />
  </head>
  <body>
    <section class="section title-section">
      <div class="container">
        <div class="title-section__subtitle">Enjoy your studying!</div>
        <h1 class="title">Our online courses</h1>
      </div>
    </section>
    <section class="section list-section">
      <div class="container">
        <div class="list-section__top">
          <ul class="list-section__categories-list">
            <li>
              <a
                href="#all"
                class="list-section__category-item button"
                data-number="17"
                >All</a
              >
            </li>
            <li>
              <a
                href="#marketing"
                class="list-section__category-item button"
                data-number=""
                >Marketing</a
              >
            </li>
            <li>
              <a
                href="managment#"
                class="list-section__category-item button"
                data-number=""
                >Management</a
              >
            </li>
            <li>
              <a
                href="#hr"
                class="list-section__category-item button"
                data-number=""
                >HR & Recruting</a
              >
            </li>
            <li>
              <a
                href="#design"
                class="list-section__category-item button"
                data-number=""
                >Design</a
              >
            </li>
            <li>
              <a
                href="#development"
                class="list-section__category-item button"
                data-number="3"
                >Development</a
              >
            </li>
          </ul>
          <input type="text" class="input" placeholder="Search course..." />
        </div>
        <ul class="list-section__list">
          <li class="card course-card">
            <picture class="card__picture">
              <source srcset="/public/media/courses/card-1.jpg" />
              <img src="/public/media/courses/card-1.jpg" alt="" />
            </picture>
            <div class="card__tag-list">
              <span class="card__tag">Marketing</span>
            </div>
            <div class="card__title"></div>
            <div class="card__bottom">
              <span class="course-card__price">$100</span>
              <span class="course-card__author">by Jerome Bell</span>
            </div>
          </li>
        </ul>
        <button
          class="text-button list-section__load-more-button"
          type="button"
        >
          Load more
        </button>
      </div>
    </section>
  </body>
</html>
